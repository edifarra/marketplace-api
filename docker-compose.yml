services:
  api:
    build:
      context: .
    container_name: marketplace-api
    env_file:
      - .env
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: marketplace-api-postgres
    environment:
      POSTGRES_DB: marketplace_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
